<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>QuizNest Quiz</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

<div class="quiz-header">

<div id="counter">
Question 1/10
</div>

<div id="timer">
00:00
</div>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div class="subject-card">

<h2 id="question">
Loading...
</h2>

</div>

<div id="options"></div>

<button id="nextBtn" class="startBtn"

onclick="nextQuestion()">

Next →

</button>

</div>
  <div id="exitModal" class="exit-modal">

    <div class="exit-box">

        <h2>⚠️ Exit Test?</h2>

        <p>Your progress will be lost.</p>

        <div class="exit-btns">

            <button id="continueBtn">
                Continue Test
            </button>

            <button id="exitBtn">
                Exit Test
            </button>

        </div>

    </div>

  </div>

<script src="../js/quiz.js"></script>

</body>

</html>
